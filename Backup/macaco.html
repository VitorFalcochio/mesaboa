<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#F8F7F3" />
    <title>Mesa Boa Rio Preto</title>
    <link rel="preconnect" href="https://images.unsplash.com" />
    <style>
      :root {
        --bg: #f8f7f3;
        --green: #0f3d2e;
        --green-soft: #e8efe9;
        --gold: #b88a3b;
        --text: #141414;
        --muted: #76736d;
        --card: #ffffff;
        --shadow: 0 28px 70px rgba(20, 20, 20, 0.16);
        --card-shadow: 0 15px 38px rgba(20, 20, 20, 0.08);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
      }

      * { box-sizing: border-box; }
      html, body { min-height: 100%; }
      body {
        margin: 0;
        overflow-x: hidden;
        color: var(--text);
        background: radial-gradient(circle at top left, rgba(184, 138, 59, 0.12), transparent 28rem), var(--bg);
      }
      button, input { font: inherit; }
      button { cursor: pointer; -webkit-tap-highlight-color: transparent; }
      img { display: block; max-width: 100%; }

      .stage {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        overflow: hidden;
      }

      .phone-frame {
        width: min(100%, 430px);
        height: min(920px, calc(100vh - 48px));
        min-height: 720px;
        padding: 10px;
        border: 1px solid rgba(20, 20, 20, 0.08);
        border-radius: 38px;
        background: linear-gradient(145deg, #fff, #eeeae1);
        box-shadow: var(--shadow);
      }

      .phone-screen {
        position: relative;
        height: 100%;
        overflow-x: hidden;
        overflow-y: auto;
        border-radius: 30px;
        background: var(--bg);
        scrollbar-width: none;
        padding: 0 18px 124px;
      }
      .phone-screen::-webkit-scrollbar { display: none; }
      .phone-screen:not(.tab-home) > .search-bar,
      .phone-screen:not(.tab-home) > .category-section,
      .phone-screen:not(.tab-home) > .restaurant-section {
        display: none;
      }

      .header {
        position: sticky;
        top: 0;
        z-index: 20;
        margin: 0 -18px;
        padding: 8px 18px 12px;
        background: rgba(248, 247, 243, 0.94);
        backdrop-filter: blur(18px);
      }

      .status-bar {
        height: 25px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 8px 0 14px;
        font-size: 13px;
        font-weight: 750;
      }
      .status-dots { display: inline-flex; align-items: center; gap: 4px; }
      .status-dots i { width: 5px; height: 5px; border-radius: 50%; background: var(--text); }
      .status-dots i:nth-child(2) { width: 16px; border-radius: 999px; }

      .top-row {
        min-height: 56px;
        display: grid;
        grid-template-columns: minmax(116px, 1fr) auto 44px;
        align-items: center;
        gap: 8px;
      }

      .brand-lockup { display: flex; align-items: center; gap: 10px; min-width: 0; }
      .brand-icon {
        width: 38px;
        height: 38px;
        display: grid;
        place-items: center;
        border: 1px solid rgba(15, 61, 46, 0.28);
        border-radius: 50%;
        color: var(--green);
        background: rgba(255, 255, 255, 0.58);
      }
      .brand-lockup strong {
        display: block;
        color: var(--green);
        font-size: 25px;
        font-weight: 850;
        line-height: .92;
      }
      .brand-lockup span {
        display: block;
        margin-top: 4px;
        color: var(--gold);
        font-size: 9px;
        font-weight: 850;
        letter-spacing: .18em;
      }

      .location-pill, .icon-button {
        border: 0;
        color: var(--green);
        background: var(--card);
        box-shadow: 0 9px 24px rgba(20, 20, 20, 0.06);
      }
      .location-pill {
        max-width: 156px;
        height: 36px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 5px;
        padding: 0 11px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 720;
        white-space: nowrap;
      }
      .location-pill span { overflow: hidden; text-overflow: ellipsis; }
      .icon-button {
        width: 42px;
        height: 42px;
        display: grid;
        place-items: center;
        border-radius: 50%;
      }

      .search-bar {
        height: 58px;
        display: grid;
        grid-template-columns: 23px 1fr 40px;
        align-items: center;
        gap: 10px;
        margin-top: 6px;
        padding: 0 8px 0 18px;
        border: 1px solid rgba(15, 61, 46, 0.06);
        border-radius: 24px;
        color: var(--green);
        background: var(--card);
        box-shadow: var(--card-shadow);
      }
      .search-bar input {
        width: 100%;
        min-width: 0;
        border: 0;
        outline: 0;
        color: var(--text);
        background: transparent;
        font-size: 14px;
        font-weight: 620;
      }
      .search-bar input::placeholder { color: #918d86; font-weight: 560; }
      .search-bar button {
        width: 40px;
        height: 40px;
        display: grid;
        place-items: center;
        border: 0;
        border-radius: 16px;
        color: var(--green);
        background: var(--green-soft);
      }

      .hero-section {
        display: grid;
        grid-template-columns: minmax(0, 1fr) clamp(118px, 33%, 136px);
        gap: 12px;
        align-items: stretch;
        margin-top: 22px;
      }
      .hero-copy h1 {
        max-width: 228px;
        margin: 0;
        font-size: 30px;
        line-height: .98;
        letter-spacing: 0;
      }
      .hero-copy p {
        max-width: 230px;
        margin: 13px 0 0;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.48;
        font-weight: 500;
      }
      .hero-card {
        position: relative;
        min-height: 206px;
        overflow: hidden;
        border-radius: 28px;
        background: var(--green);
        box-shadow: 0 22px 44px rgba(15, 61, 46, .2);
      }
      .hero-card img {
        width: 100%;
        height: 100%;
        min-height: 206px;
        object-fit: cover;
      }
      .hero-overlay {
        position: absolute;
        left: 10px;
        right: 10px;
        bottom: 10px;
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px;
        border-radius: 18px;
        color: #fff;
        background: rgba(15, 61, 46, .88);
        backdrop-filter: blur(10px);
        font-size: 12px;
        font-weight: 760;
        line-height: 1.2;
      }
      .hero-overlay svg { color: var(--gold); flex: 0 0 auto; }

      .category-section {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 14px 10px;
        margin-top: 27px;
      }
      .category-button {
        min-width: 0;
        border: 0;
        background: transparent;
        color: var(--text);
        text-align: center;
      }
      .category-button span {
        width: 54px;
        height: 54px;
        display: grid;
        place-items: center;
        margin: 0 auto 8px;
        border: 1px solid rgba(15, 61, 46, .08);
        border-radius: 50%;
        color: var(--green);
        background: var(--card);
        box-shadow: 0 10px 22px rgba(20, 20, 20, .06);
        transition: transform 160ms ease;
      }
      .category-button strong {
        display: block;
        color: #3b3934;
        font-size: 10.5px;
        font-weight: 730;
        line-height: 1.14;
      }

      .restaurant-section { margin-top: 30px; }
      .section-heading {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        margin-bottom: 14px;
      }
      .section-heading h2 {
        margin: 0;
        font-size: 20px;
        font-weight: 820;
      }
      .section-heading button {
        border: 0;
        color: var(--gold);
        background: transparent;
        font-size: 13px;
        font-weight: 820;
      }

      .restaurant-track {
        display: grid;
        grid-auto-flow: column;
        grid-auto-columns: minmax(246px, 76%);
        gap: 14px;
        overflow-x: auto;
        width: 100%;
        padding: 0 0 8px;
        scroll-snap-type: x mandatory;
        scrollbar-width: none;
      }
      .restaurant-track::-webkit-scrollbar { display: none; }
      .restaurant-card {
        overflow: hidden;
        border: 1px solid rgba(15, 61, 46, .05);
        border-radius: 24px;
        background: var(--card);
        box-shadow: var(--card-shadow);
        scroll-snap-align: start;
      }
      .restaurant-image {
        position: relative;
        height: 156px;
        overflow: hidden;
        border-radius: 24px 24px 18px 18px;
        background: #e7e1d6;
      }
      .restaurant-image img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 350ms ease;
      }
      .rating-badge, .heart-button { position: absolute; top: 12px; }
      .rating-badge {
        left: 12px;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 30px;
        padding: 0 10px;
        border-radius: 999px;
        color: #fff;
        background: var(--green);
        font-size: 12px;
        font-weight: 820;
      }
      .rating-badge svg { color: var(--gold); }
      .heart-button {
        right: 12px;
        width: 34px;
        height: 34px;
        display: grid;
        place-items: center;
        border: 0;
        border-radius: 50%;
        color: var(--green);
        background: rgba(255, 255, 255, .92);
        backdrop-filter: blur(8px);
      }
      .restaurant-info { padding: 14px 15px 16px; }
      .restaurant-info h3 {
        margin: 0;
        font-size: 17px;
        line-height: 1.15;
      }
      .restaurant-info p {
        margin: 7px 0 0;
        color: var(--muted);
        font-size: 13px;
        font-weight: 590;
      }
      .restaurant-info small {
        display: block;
        margin-top: 9px;
        color: var(--green);
        font-size: 12px;
        font-weight: 740;
      }
      .restaurant-track.is-empty {
        display: block;
      }
      .restaurant-track.is-empty::before {
        content: "Nenhum restaurante cadastrado ainda.";
        min-height: 118px;
        display: grid;
        place-items: center;
        padding: 22px;
        border: 1px dashed rgba(15, 61, 46, .18);
        border-radius: 24px;
        color: var(--muted);
        background: rgba(255, 255, 255, .58);
        font-size: 13px;
        font-weight: 680;
        text-align: center;
      }
      .restaurant-track.is-empty .restaurant-card {
        display: none;
      }
      .app-page {
        display: none;
        animation: pageIn 180ms ease both;
      }
      .phone-screen:not(.tab-home) .app-page {
        display: block;
      }
      .page-title {
        margin: 22px 0 20px;
      }
      .page-title span {
        display: block;
        color: var(--gold);
        font-size: 11px;
        font-weight: 850;
        letter-spacing: .13em;
        text-transform: uppercase;
      }
      .page-title h1 {
        margin: 6px 0 0;
        color: var(--text);
        font-size: 28px;
        line-height: 1.08;
      }
      .page-panel {
        display: grid;
        gap: 12px;
        padding: 0;
        border: 0;
        border-radius: 0;
        background: transparent;
        box-shadow: none;
      }
      .page-panel + .page-panel {
        margin-top: 26px;
      }
      .page-panel h2 {
        margin: 0;
        font-size: 18px;
      }
      .page-panel p {
        margin: 0;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.45;
        font-weight: 560;
      }
      .search-page-field {
        min-height: 58px;
        display: grid;
        grid-template-columns: 22px minmax(0, 1fr) auto;
        align-items: center;
        gap: 10px;
        padding: 0 8px 0 16px;
        border: 1px solid rgba(15, 61, 46, .08);
        border-radius: 22px;
        color: var(--green);
        background: #fff;
        box-shadow: 0 12px 28px rgba(20, 20, 20, .06);
      }
      .search-page-field input {
        min-width: 0;
        border: 0;
        outline: 0;
        background: transparent;
        color: var(--text);
        font-weight: 650;
      }
      .search-page-field button {
        min-height: 42px;
        padding: 0 14px;
        border: 0;
        border-radius: 16px;
        color: #fff;
        background: var(--green);
        font-weight: 820;
      }
      .filter-chip-row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }
      .filter-chip-row button {
        min-height: 42px;
        padding: 0 15px;
        border: 1px solid rgba(15, 61, 46, .08);
        border-radius: 999px;
        color: var(--green);
        background: rgba(255, 255, 255, .68);
        font-weight: 820;
      }
      .quiet-empty {
        margin-top: 18px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.45;
      }
      .page-action-row {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }
      .page-action-row button,
      .page-panel > button {
        min-height: 44px;
        border: 0;
        border-radius: 16px;
        color: var(--green);
        background: var(--green-soft);
        font-weight: 820;
      }
      .restaurant-form {
        display: grid;
        gap: 12px;
      }
      .restaurant-form label {
        display: grid;
        gap: 7px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 780;
      }
      .restaurant-form input,
      .restaurant-form select,
      .restaurant-form textarea {
        width: 100%;
        min-height: 44px;
        border: 1px solid rgba(15, 61, 46, .08);
        border-radius: 16px;
        padding: 0 13px;
        color: var(--text);
        background: #fff;
        outline: 0;
      }
      .restaurant-form textarea {
        min-height: 78px;
        padding-block: 12px;
        resize: vertical;
      }
      .restaurant-form button {
        min-height: 48px;
        border: 0;
        border-radius: 18px;
        color: #fff;
        background: var(--green);
        font-weight: 850;
      }
      .restaurant-form button[type="button"] {
        color: var(--green);
        background: var(--green-soft);
      }
      .import-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 8px;
        align-items: end;
      }
      .import-row label {
        min-width: 0;
      }
      .restaurant-form .import-row button {
        min-height: 44px;
        padding: 0 13px;
        color: var(--green);
        background: var(--green-soft);
        white-space: nowrap;
      }
      .ranking-placeholder {
        display: grid;
        gap: 10px;
        counter-reset: rank;
      }
      .ranking-placeholder div {
        min-height: 54px;
        display: flex;
        align-items: center;
        gap: 12px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 700;
      }
      .ranking-placeholder div::before {
        counter-increment: rank;
        content: "#" counter(rank);
        width: 42px;
        height: 42px;
        display: grid;
        place-items: center;
        border-radius: 14px;
        color: var(--green);
        background: var(--green-soft);
        font-weight: 900;
      }
      @keyframes pageIn {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .preview-sections {
        display: none;
      }
      .empty-state {
        min-height: 118px;
        display: grid;
        place-items: center;
        padding: 22px;
        border: 1px dashed rgba(15, 61, 46, .18);
        border-radius: 24px;
        color: var(--muted);
        background: rgba(255, 255, 255, .58);
        font-size: 13px;
        font-weight: 680;
        text-align: center;
      }

      .preview-sections {
        display: grid;
        gap: 12px;
        margin-top: 30px;
      }
      .preview-sections button {
        min-height: 72px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        padding: 0 18px;
        border: 1px solid rgba(15, 61, 46, .07);
        border-radius: 22px;
        color: var(--text);
        background: rgba(255, 255, 255, .72);
        box-shadow: 0 12px 30px rgba(20, 20, 20, .05);
      }
      .preview-sections span {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        font-size: 15px;
        font-weight: 780;
      }
      .preview-sections svg { color: var(--gold); }
      .preview-sections strong {
        color: var(--green);
        font-size: 12px;
        font-weight: 780;
      }

      .bottom-nav {
        position: fixed;
        left: 50%;
        bottom: max(13px, env(safe-area-inset-bottom));
        z-index: 30;
        width: min(378px, calc(100vw - 26px));
        height: 78px;
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        align-items: center;
        gap: 2px;
        padding: 8px;
        border: 1px solid rgba(15, 61, 46, .08);
        border-radius: 28px;
        background: rgba(255, 255, 255, .94);
        box-shadow: 0 18px 44px rgba(20, 20, 20, .13);
        backdrop-filter: blur(18px);
        transform: translateX(-50%);
      }
      .bottom-nav button {
        height: 60px;
        min-width: 0;
        display: grid;
        place-items: center;
        align-content: center;
        gap: 4px;
        border: 0;
        border-radius: 20px;
        color: #77736d;
        background: transparent;
      }
      .bottom-nav span {
        overflow: hidden;
        max-width: 100%;
        text-overflow: ellipsis;
        font-size: 10px;
        font-weight: 760;
        line-height: 1;
      }
      .bottom-nav .active {
        color: var(--green);
        background: var(--green-soft);
      }
      .preview-sections {
        display: none;
      }

      .heart-button.saved {
        color: #fff;
        background: var(--green);
      }
      .category-button.active span {
        color: #fff;
        background: var(--green);
      }
      .toast {
        position: fixed;
        left: 50%;
        bottom: 108px;
        z-index: 80;
        width: min(330px, calc(100vw - 32px));
        padding: 13px 16px;
        border-radius: 18px;
        color: #fff;
        background: rgba(15, 61, 46, .96);
        box-shadow: 0 18px 42px rgba(20, 20, 20, .18);
        font-size: 13px;
        font-weight: 750;
        text-align: center;
        opacity: 0;
        pointer-events: none;
        transform: translate(-50%, 14px);
        transition: opacity 180ms ease, transform 180ms ease;
      }
      .toast.show {
        opacity: 1;
        transform: translate(-50%, 0);
      }
      .app-sheet {
        position: fixed;
        left: 50%;
        bottom: 13px;
        z-index: 70;
        width: min(404px, calc(100vw - 26px));
        max-height: min(76vh, 690px);
        overflow-y: auto;
        padding: 14px;
        border: 1px solid rgba(15, 61, 46, .08);
        border-radius: 28px;
        background: rgba(255, 255, 255, .97);
        box-shadow: 0 28px 70px rgba(20, 20, 20, .22);
        transform: translateX(-50%) translateY(110%);
        transition: transform 220ms ease;
      }
      .app-sheet.open {
        transform: translateX(-50%) translateY(0);
      }
      .sheet-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 12px;
      }
      .sheet-head h2 {
        margin: 0;
        font-size: 20px;
      }
      .sheet-close {
        width: 36px;
        height: 36px;
        display: grid;
        place-items: center;
        border: 0;
        border-radius: 50%;
        color: var(--green);
        background: var(--green-soft);
      }
      .sheet-list {
        display: grid;
        gap: 12px;
      }
      .sheet-card {
        display: grid;
        grid-template-columns: 82px minmax(0, 1fr);
        gap: 12px;
        align-items: center;
        border: 0;
        color: inherit;
        background: transparent;
        text-align: left;
      }
      .sheet-card img {
        width: 82px;
        height: 72px;
        border-radius: 16px;
        object-fit: cover;
      }
      .sheet-card strong {
        display: block;
        font-size: 15px;
      }
      .sheet-card span {
        display: block;
        margin-top: 5px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 650;
      }
      .detail-photo {
        width: 100%;
        height: 180px;
        object-fit: cover;
        border-radius: 22px;
        margin-bottom: 12px;
      }
      .detail-actions {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
        margin-top: 14px;
      }
      .detail-actions button {
        min-height: 44px;
        border: 0;
        border-radius: 16px;
        color: var(--green);
        background: var(--green-soft);
        font-weight: 820;
      }

      svg {
        width: 21px;
        height: 21px;
        fill: none;
        stroke: currentColor;
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-width: 2;
      }

      .category-button:active span,
      .search-bar button:active,
      .bottom-nav button:active,
      .preview-sections button:active,
      .restaurant-card:active { transform: scale(.97); }

      @media (hover: hover) {
        .category-button:hover span,
        .search-bar button:hover,
        .bottom-nav button:hover,
        .preview-sections button:hover { transform: translateY(-2px); }
        .restaurant-card:hover img { transform: scale(1.045); }
      }

      @media (max-width: 520px) {
        body { overflow: hidden; }
        .stage { display: block; padding: 0; }
        .phone-frame {
          width: 100%;
          height: 100vh;
          min-height: 100vh;
          padding: 0;
          border: 0;
          border-radius: 0;
          background: var(--bg);
          box-shadow: none;
        }
        .phone-screen {
          width: 100vw;
          max-width: 100vw;
          border-radius: 0;
        }
        .bottom-nav {
          width: calc(100vw - 26px);
        }
      }

      @media (max-width: 390px) {
        .phone-screen { padding-inline: 14px; }
        .header { margin-inline: -14px; padding-inline: 14px; }
        .top-row { grid-template-columns: minmax(108px, 1fr) minmax(0, 132px) 40px; gap: 6px; }
        .brand-icon { width: 34px; height: 34px; }
        .brand-lockup { gap: 8px; }
        .brand-lockup strong { font-size: 22px; }
        .location-pill { height: 34px; padding: 0 8px; font-size: 10px; }
        .icon-button { width: 38px; height: 38px; }
        .hero-section { grid-template-columns: minmax(0, 1fr) 120px; gap: 11px; }
        .hero-copy h1 { font-size: 26px; }
        .hero-copy p { font-size: 12px; }
        .category-section { gap: 12px 7px; }
        .category-button span { width: 48px; height: 48px; }
        .category-button strong { font-size: 10px; }
        .restaurant-track { grid-auto-columns: minmax(230px, 79%); }
      }
    </style>
  </head>
  <body>
    <main class="stage">
      <section class="phone-frame" aria-label="Mesa Boa Rio Preto">
        <div class="phone-screen tab-home">
          <header class="header">
            <div class="status-bar">
              <span>9:41</span>
              <span class="status-dots" aria-hidden="true"><i></i><i></i><i></i></span>
            </div>
            <div class="top-row">
              <div class="brand-lockup">
                <div class="brand-icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24"><path d="M6 2v8M10 2v8M8 2v20M17 2v20M14 2c3 2 4 5 3 9"/></svg>
                </div>
                <div><strong>MESA</strong><span>BOA RIO PRETO</span></div>

              <button class="location-pill" type="button">
                <svg viewBox="0 0 24 24"><path d="M12 21s7-4.7 7-11a7 7 0 1 0-14 0c0 6.3 7 11 7 11Z"/><circle cx="12" cy="10" r="2.5"/></svg>
                <span>São José do Rio Preto</span>

              <button class="icon-button" type="button" aria-label="Notificações">

          <div class="search-bar" role="search">

              <svg viewBox="0 0 24 24"><path d="M4 6h10M18 6h2M4 12h3M11 12h9M4 18h12M20 18h0"/><circle cx="16" cy="6" r="2"/><circle cx="9" cy="12" r="2"/><circle cx="18" cy="18" r="2"/></svg>

            <button class="category-button" type="button"><span><svg viewBox="0 0 24 24"><path d="M12 22V8M9 8h6M8 2h8l-2 6h-4L8 2Z"/></svg></span><strong>Italiano</strong></button>
            <button class="category-button" type="button"><span><svg viewBox="0 0 24 24"><path d="M5 12c3-7 11-7 14 0-3 7-11 7-14 0Z"/><path d="M9 12h6"/></svg></span><strong>Churrascaria</strong></button>
            <button class="category-button" type="button"><span><svg viewBox="0 0 24 24"><path d="M5 12h14M7 9h10M7 15h10M6 18h12a2 2 0 0 0 2-2H4a2 2 0 0 0 2 2ZM5 9a7 7 0 0 1 14 0"/></svg></span><strong>Hamburgueria</strong></button>

            <button class="category-button" type="button"><span><svg viewBox="0 0 24 24"><path d="M4 8h13v6a5 5 0 0 1-5 5H9a5 5 0 0 1-5-5V8Z"/><path d="M17 10h1a3 3 0 0 1 0 6h-1M6 2v2M10 2v2M14 2v2"/></svg></span><strong>Café</strong></button>
            <button class="category-button" type="button"><span><svg viewBox="0 0 24 24"><path d="M5 11h14v10H5V11Z"/><path d="M8 11V8a4 4 0 0 1 8 0v3M8 15h8"/></svg></span><strong>Doceria</strong></button>
            <button class="category-button" type="button"><span><svg viewBox="0 0 24 24"><path d="M4 18h16M6 18a6 6 0 0 1 12 0M12 6v3M9 6h6"/></svg></span><strong>Almoço</strong></button>
            <button class="category-button" type="button"><span><svg viewBox="0 0 24 24"><path d="M6 2v8M10 2v8M8 2v20M17 2v20M14 2c3 2 4 5 3 9"/></svg></span><strong>Jantar</strong></button>
            <button class="category-button" type="button"><span><svg viewBox="0 0 24 24"><path d="M3 7h18v11H3V7Z"/><path d="M7 7V5h10v2M7 18v2M17 18v2M8 11h8"/></svg></span><strong>Delivery</strong></button>
          </section>

          <section class="restaurant-section">
            <div class="section-heading">
              <h2>Melhores avaliados</h2>
              <button type="button">Ver todos</button>
            </div>
            <div class="restaurant-track"></div>
          </section>

          <section class="restaurant-section">
            <div class="section-heading"><h2>Em alta essa semana</h2></div>
            <div class="restaurant-track"></div>
          </section>

          <section class="app-page" id="appPage" aria-live="polite"></section>

          <nav class="bottom-nav" aria-label="Navegação inferior">
            <button class="active" type="button"><svg viewBox="0 0 24 24"><path d="m3 11 9-8 9 8"/><path d="M5 10v10h14V10"/></svg><span>Início</span></button>
            <button type="button"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><span>Buscar</span></button>
            <button type="button"><svg viewBox="0 0 24 24"><path d="m2 4 5 12 5-10 5 10 5-12v16H2V4Z"/></svg><span>Rankings</span></button>
            <button type="button"><svg viewBox="0 0 24 24"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8Z"/></svg><span>Favoritos</span></button>
            <button type="button"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg><span>Perfil</span></button>
          </nav>
        </div>
      </section>
    </main>
    <section class="app-sheet" id="appSheet" aria-live="polite"></section>
    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script>
      const defaultRestaurantImage = 'https://images.unsplash.com/photo-1559339352-11d035aa65de?auto=format&fit=crop&w=900&q=85';
      const restaurants = JSON.parse(localStorage.getItem('mesaBoaRestaurants') || '[]');

      const state = {
        favorites: new Set(JSON.parse(localStorage.getItem('mesaBoaFavorites') || '[]')),
        currentUser: JSON.parse(localStorage.getItem('mesaBoaCurrentUser') || 'null'),
        pendingAction: null
      };

      const sheet = document.getElementById('appSheet');
      const toast = document.getElementById('toast');
      const screen = document.querySelector('.phone-screen');
      const appPage = document.getElementById('appPage');
      const searchInput = document.querySelector('.search-bar input');
      const statusTime = document.querySelector('.status-bar > span:first-child');
      if (statusTime) {
        statusTime.textContent = new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
      }

      function normalize(value) {
        return value.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
      }

      function restaurantByName(name) {
        return restaurants.find((item) => item.name === name);
      }

      function showToast(message) {
        toast.textContent = message;
        toast.classList.add('show');
        clearTimeout(showToast.timer);
        showToast.timer = setTimeout(() => toast.classList.remove('show'), 2300);
      }

      function saveFavorites() {
        localStorage.setItem('mesaBoaFavorites', JSON.stringify([...state.favorites]));
      }

      function saveRestaurants() {
        localStorage.setItem('mesaBoaRestaurants', JSON.stringify(restaurants));
      }

      function scoreValue(item) {
        return Number(String(item.rating || '0').replace(',', '.')) || 0;
      }

      function restaurantCardHtml(item) {
        const image = item.image || defaultRestaurantImage;
        return `
          <article class="restaurant-card" data-restaurant-card="${item.id}">
            <div class="restaurant-image">
              <img src="${image}" alt="${item.name}">
              <span class="rating-badge">${item.rating || 'Novo'}</span>
              <button class="heart-button ${state.favorites.has(item.name) ? 'saved' : ''}" type="button" aria-label="Salvar ${item.name}">
                <svg viewBox="0 0 24 24"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8Z"/></svg>
              </button>
            </div>
            <div class="restaurant-info">
              <h3>${item.name}</h3>
              <p>${item.type} • ${item.district}</p>
              <small>${item.price || '$$'} • ${item.hours || 'Horário não informado'}</small>
            </div>
          </article>
        `;
      }

      function renderHomeRestaurants() {
        const tracks = document.querySelectorAll('.restaurant-track');
        const top = [...restaurants].sort((a, b) => scoreValue(b) - scoreValue(a));
        const recent = [...restaurants].slice(-6).reverse();
        const lists = [top, recent];

        tracks.forEach((track, index) => {
          const items = lists[index] || [];
          track.classList.toggle('is-empty', items.length === 0);
          track.innerHTML = items.map(restaurantCardHtml).join('');
        });
      }

      function cardHtml(item) {
        return `
          <button class="sheet-card" type="button" data-open-restaurant="${item.name}">
            <img src="${item.image}" alt="${item.name}">
            <span><strong>${item.name}</strong><span>${item.type} - ${item.district} - ${item.rating}</span></span>
          </button>
        `;
      }

      function openSheet(title, content) {
        sheet.innerHTML = `
          <div class="sheet-head">
            <h2>${title}</h2>
            <button class="sheet-close" type="button" aria-label="Fechar">x</button>
          </div>
          ${content}
        `;
        sheet.classList.add('open');
      }

      function closeSheet() {
        sheet.classList.remove('open');
      }

      function showList(title, items) {
        openSheet(title, `<div class="sheet-list">${items.map(cardHtml).join('') || '<p>Nenhum restaurante encontrado.</p>'}</div>`);
      }

      function openRestaurant(item) {
        if (!item) return;
        openSheet(item.name, `
          <img class="detail-photo" src="${item.image || defaultRestaurantImage}" alt="${item.name}">
          <p>${item.type} em ${item.district}. ${item.rating === 'Novo' ? 'Restaurante recém-cadastrado' : `Nota ${item.rating}`}, ${item.price}, ${item.hours || 'horário não informado'}.</p>
          ${item.address ? `<p><strong>Endereço:</strong> ${item.address}</p>` : ''}
          <div class="detail-actions">
            <button type="button" data-detail-action="maps" data-restaurant="${item.name}">Como chegar</button>
            <button type="button" data-detail-action="contact" data-restaurant="${item.name}">Contato</button>
            <button type="button" data-detail-action="reserve" data-restaurant="${item.name}">Reservar</button>
            <button type="button" data-favorite-name="${item.name}">${state.favorites.has(item.name) ? 'Remover' : 'Favoritar'}</button>
          </div>
        `);
      }

      function addRestaurant(form) {
        const data = new FormData(form);
        const restaurant = {
          id: Date.now(),
          name: data.get('name').trim(),
          type: data.get('type'),
          district: data.get('district').trim(),
          price: data.get('price') || '$$',
          phone: data.get('phone').trim(),
          hours: data.get('hours').trim(),
          image: data.get('image').trim() || defaultRestaurantImage,
          mapsUrl: data.get('mapsUrl').trim(),
          address: data.get('address').trim(),
          lat: data.get('lat'),
          lng: data.get('lng'),
          description: data.get('description').trim(),
          rating: data.get('rating') || 'Novo',
          reviews: data.get('reviews') || '0',
          distance: 'Local'
        };

        restaurants.unshift(restaurant);
        saveRestaurants();
        renderHomeRestaurants();
        form.reset();
        showToast(`${restaurant.name} cadastrado com sucesso.`);
        setTab('Início');
      }

      function mapsQueryFromUrl(value) {
        const decoded = decodeURIComponent(value.trim());
        const placeMatch = decoded.match(/\/place\/([^/@?]+)/);
        const queryMatch = decoded.match(/[?&]query=([^&]+)/);
        const coordMatch = decoded.match(/@(-?\d+(?:\.\d+)?),(-?\d+(?:\.\d+)?)/);
        const searchMatch = decoded.match(/\/search\/([^/@?]+)/);

        return {
          name: (placeMatch && placeMatch[1]) || (queryMatch && queryMatch[1]) || (searchMatch && searchMatch[1]) || '',
          lat: coordMatch ? coordMatch[1] : '',
          lng: coordMatch ? coordMatch[2] : ''
        };
      }

      function cleanMapsName(value) {
        return value
          .replace(/\+/g, ' ')
          .replace(/\s*-\s*Google Maps$/i, '')
          .replace(/\s+/g, ' ')
          .trim();
      }

      function inferDistrict(text) {
        const parts = cleanMapsName(text).split(',').map((part) => part.trim()).filter(Boolean);
        const cityIndex = parts.findIndex((part) => normalize(part).includes('sao jose do rio preto'));
        if (cityIndex > 0) return parts[cityIndex - 1].replace(/^(bairro|jd\.?|jardim)\s+/i, '').trim();
        return parts.length > 1 ? parts[parts.length - 2] : '';
      }

      function importFromMaps(form) {
        const mapsUrl = form.elements.mapsUrl.value.trim();
        if (!mapsUrl) {
          showToast('Cole um link do Google Maps primeiro.');
          return;
        }

        const parsed = mapsQueryFromUrl(mapsUrl);
        const cleaned = cleanMapsName(parsed.name);
        const pieces = cleaned.split(',').map((part) => part.trim()).filter(Boolean);

        if (!form.elements.name.value && pieces[0]) form.elements.name.value = pieces[0];
        if (!form.elements.address.value && pieces.length > 1) form.elements.address.value = pieces.join(', ');
        if (!form.elements.district.value) form.elements.district.value = inferDistrict(cleaned);
        if (parsed.lat) form.elements.lat.value = parsed.lat;
        if (parsed.lng) form.elements.lng.value = parsed.lng;

        showToast(cleaned ? 'Dados do link aplicados ao cadastro.' : 'Link salvo. Preencha os demais dados manualmente.');
      }

      function runSearch() {
        const query = normalize(searchInput.value.trim());
        const results = restaurants.filter((item) => normalize(`${item.name} ${item.type} ${item.district}`).includes(query));
        showList(query ? `Busca: ${searchInput.value}` : 'Todos os restaurantes', results);
      }

      function users() {
        return JSON.parse(localStorage.getItem('mesaBoaUsers') || '[]');
      }

      function saveUsers(items) {
        localStorage.setItem('mesaBoaUsers', JSON.stringify(items));
      }

      function requireLogin(action, message = 'Entre para continuar.') {
        if (state.currentUser) return true;
        state.pendingAction = action;
        showToast(message);
        screen.classList.remove('tab-home');
        document.querySelectorAll('.bottom-nav button').forEach((button) => {
          button.classList.toggle('active', button.textContent.trim() === 'Perfil');
        });
        renderPage('login');
        screen.scrollTo({ top: 0, behavior: 'smooth' });
        return false;
      }

      function completePendingAction() {
        const action = state.pendingAction;
        state.pendingAction = null;
        if (!action) {
          renderPage('perfil');
          return;
        }
        if (action.type === 'tab') setTab(action.target);
        if (action.type === 'favorite') toggleFavorite(action.name);
        if (action.type === 'restaurant-register') renderPage('cadastro');
        if (action.type === 'reviews') showToast('Nenhuma avaliação cadastrada ainda.');
      }

      function createUser(form) {
        const data = new FormData(form);
        const name = data.get('name').trim();
        const email = data.get('email').trim().toLowerCase();
        const password = data.get('password');
        const confirmPassword = data.get('confirmPassword');
        const existingUsers = users();

        if (password.length < 6) {
          showToast('Use uma senha com pelo menos 6 caracteres.');
          return;
        }
        if (password !== confirmPassword) {
          showToast('As senhas não conferem.');
          return;
        }
        if (existingUsers.some((user) => user.email === email)) {
          showToast('Este e-mail já está cadastrado.');
          return;
        }

        const user = { id: Date.now(), name, email, password };
        existingUsers.push(user);
        saveUsers(existingUsers);
        state.currentUser = { id: user.id, name: user.name, email: user.email };
        localStorage.setItem('mesaBoaCurrentUser', JSON.stringify(state.currentUser));
        showToast('Conta criada com sucesso.');
        completePendingAction();
      }

      function loginUser(form) {
        const data = new FormData(form);
        const email = data.get('email').trim().toLowerCase();
        const password = data.get('password');
        const user = users().find((item) => item.email === email && item.password === password);

        if (!user) {
          showToast('E-mail ou senha inválidos.');
          return;
        }

        state.currentUser = { id: user.id, name: user.name, email: user.email };
        localStorage.setItem('mesaBoaCurrentUser', JSON.stringify(state.currentUser));
        showToast(`Bem-vindo, ${user.name}.`);
        completePendingAction();
      }

      function logoutUser() {
        state.currentUser = null;
        localStorage.removeItem('mesaBoaCurrentUser');
        showToast('Você saiu da conta.');
        renderPage('perfil');
      }

      function renderPage(key) {
        const rankingList = restaurants.length
          ? [...restaurants].sort((a, b) => scoreValue(b) - scoreValue(a)).slice(0, 5).map((item) => `<button class="sheet-card" type="button" data-open-restaurant="${item.name}"><img src="${item.image || defaultRestaurantImage}" alt="${item.name}"><span><strong>${item.name}</strong><span>${item.type} - ${item.rating || 'Novo'}</span></span></button>`).join('')
          : '<p>Nenhum restaurante cadastrado para montar rankings.</p>';
        const favoriteList = restaurants.filter((item) => state.favorites.has(item.name));
        const profilePanel = state.currentUser ? `
            <div class="page-panel">
              <h2>${state.currentUser.name}</h2>
              <p>${state.currentUser.email}</p>
              <div class="page-action-row">
                <button type="button" data-profile-action="reviews">Avaliações</button>
                <button type="button" data-profile-action="logout">Sair</button>
              </div>
            </div>
          ` : `
            <div class="page-panel">
              <h2>Acesso do usuário</h2>
              <p>Entre ou crie uma conta para acompanhar favoritos, avaliações e reservas.</p>
              <div class="page-action-row">
                <button type="button" data-profile-action="login">Entrar</button>
                <button type="button" data-profile-action="signup">Criar conta</button>
              </div>
            </div>
          `;
        const pages = {
          buscar: `
            <div class="page-title">
              <span>Busca</span>
              <h1>Encontre um lugar</h1>
            </div>
            <div class="search-page-field">
              <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
              <input id="pageSearchInput" type="search" placeholder="Nome, bairro ou tipo de comida">
              <button type="button" data-page-action="page-search">Buscar</button>
            </div>
            <p class="quiet-empty">Use a busca ou escolha um filtro rápido para encontrar restaurantes cadastrados.</p>
            <div class="page-panel">
              <h2>Filtros rápidos</h2>
              <div class="filter-chip-row">
                <button type="button" data-page-action="empty-category">Japonês</button>
                <button type="button" data-page-action="empty-category">Italiano</button>
                <button type="button" data-page-action="empty-category">Delivery</button>
                <button type="button" data-page-action="empty-category">Aberto agora</button>
              </div>
            </div>
          `,
          rankings: `
            <div class="page-title">
              <span>Rankings</span>
              <h1>Melhores da cidade</h1>
            </div>
            <div class="page-panel">
              <h2>Top restaurantes</h2>
              <p>Ranking montado automaticamente pelos restaurantes cadastrados.</p>
              <div class="sheet-list">${rankingList}</div>
            </div>
          `,
          favoritos: `
            <div class="page-title">
              <span>Favoritos</span>
              <h1>Salvos</h1>
            </div>
            <div class="page-panel">
              <h2>${favoriteList.length ? 'Restaurantes favoritos' : 'Nenhum favorito ainda'}</h2>
              <div class="sheet-list">${favoriteList.map(cardHtml).join('') || '<p>Os restaurantes salvos aparecerão aqui para você comparar e acessar rapidamente.</p>'}</div>
              <button type="button" data-page-action="go-search">Buscar restaurantes</button>
            </div>
          `,
          perfil: `
            <div class="page-title">
              <span>Perfil</span>
              <h1>Sua conta</h1>
            </div>
            ${profilePanel}
            <div class="page-panel">
              <h2>Para restaurantes</h2>
              <p>Cadastre restaurantes para alimentar a home, busca, rankings e detalhes do app.</p>
              <button type="button" data-profile-action="restaurant">Cadastrar restaurante</button>
            </div>
          `,
          login: `
            <div class="page-title">
              <span>Entrar</span>
              <h1>Acesse sua conta</h1>
            </div>
            <form class="restaurant-form page-panel" id="loginForm">
              <label>E-mail<input name="email" type="email" required placeholder="voce@email.com"></label>
              <label>Senha<input name="password" type="password" required placeholder="Sua senha"></label>
              <button type="submit">Entrar</button>
              <button type="button" data-profile-action="signup">Criar nova conta</button>
            </form>
          `,
          signup: `
            <div class="page-title">
              <span>Criar conta</span>
              <h1>Comece no Mesa Boa</h1>
            </div>
            <form class="restaurant-form page-panel" id="signupForm">
              <label>Nome<input name="name" required placeholder="Seu nome"></label>
              <label>E-mail<input name="email" type="email" required placeholder="voce@email.com"></label>
              <label>Senha<input name="password" type="password" required placeholder="Mínimo de 6 caracteres"></label>
              <label>Confirmar senha<input name="confirmPassword" type="password" required placeholder="Repita sua senha"></label>
              <button type="submit">Criar conta</button>
              <button type="button" data-profile-action="login">Já tenho conta</button>
            </form>
          `,
          cadastro: `
            <div class="page-title">
              <span>Restaurante</span>
              <h1>Cadastrar restaurante</h1>
            </div>
            <form class="restaurant-form page-panel" id="restaurantForm">
              <div class="import-row">
                <label>Link do Google Maps<input name="mapsUrl" type="url" placeholder="Cole o link do Maps"></label>
                <button type="button" data-page-action="import-maps">Puxar dados</button>
              </div>
              <label>Nome do restaurante<input name="name" required placeholder="Ex.: Mesa Boa Grill"></label>
              <label>Tipo de comida
                <select name="type" required>
                  <option value="">Selecione</option>
                  <option>Japonês</option>
                  <option>Italiano</option>
                  <option>Churrascaria</option>
                  <option>Hamburgueria</option>
                  <option>Pizzaria</option>
                  <option>Café</option>
                  <option>Doceria</option>
                  <option>Comida brasileira</option>
                </select>
              </label>
              <label>Endereço<input name="address" placeholder="Rua, número, bairro"></label>
              <label>Bairro<input name="district" required placeholder="Ex.: Vila Redentora"></label>
              <label>Faixa de preço
                <select name="price">
                  <option>$</option>
                  <option selected>$$</option>
                  <option>$$$</option>
                  <option>$$$$</option>
                </select>
              </label>
              <label>WhatsApp<input name="phone" placeholder="Ex.: 5517999999999"></label>
              <label>Horário<input name="hours" placeholder="Ex.: Ter a dom, 18h às 23h"></label>
              <label>Imagem do restaurante<input name="image" type="url" placeholder="https://..."></label>
              <input name="lat" type="hidden">
              <input name="lng" type="hidden">
              <input name="rating" type="hidden">
              <input name="reviews" type="hidden">
              <label>Descrição<textarea name="description" placeholder="Resumo do restaurante"></textarea></label>
              <button type="submit">Salvar restaurante</button>
            </form>
          `
        };
        appPage.innerHTML = pages[key] || '';
      }

      function setTab(label) {
        const key = normalize(label);
        document.querySelectorAll('.bottom-nav button').forEach((button) => {
          button.classList.toggle('active', button.textContent.trim() === label);
        });
        closeSheet();

        if (key.startsWith('in')) {
          screen.classList.add('tab-home');
          appPage.innerHTML = '';
          screen.scrollTo({ top: 0, behavior: 'smooth' });
          return;
        }

        screen.classList.remove('tab-home');

        if (key.includes('buscar')) {
          renderPage('buscar');
        }
        if (key.includes('rankings')) {
          renderPage('rankings');
        }
        if (key.includes('favoritos')) {
          if (!requireLogin({ type: 'tab', target: 'Favoritos' }, 'Entre para ver seus favoritos.')) return;
          renderPage('favoritos');
        }
        if (key.includes('perfil')) {
          renderPage('perfil');
        }
        screen.scrollTo({ top: 0, behavior: 'smooth' });
      }

      function syncFavoriteButtons() {
        document.querySelectorAll('.heart-button').forEach((button) => {
          const card = button.closest('.restaurant-card');
          const name = card && card.querySelector('h3') ? card.querySelector('h3').textContent.trim() : '';
          button.classList.toggle('saved', state.favorites.has(name));
        });
      }

      function toggleFavorite(name) {
        if (!requireLogin({ type: 'favorite', name }, 'Entre para salvar restaurantes.')) return;
        if (state.favorites.has(name)) {
          state.favorites.delete(name);
          showToast(`${name} removido dos favoritos.`);
        } else {
          state.favorites.add(name);
          showToast(`${name} salvo nos favoritos.`);
        }
        saveFavorites();
        syncFavoriteButtons();
        if (!screen.classList.contains('tab-home')) {
          const active = document.querySelector('.bottom-nav .active')?.textContent.trim();
          if (active) setTab(active);
        }
      }

      document.addEventListener('click', (event) => {
        const closeButton = event.target.closest('.sheet-close');
        const locationButton = event.target.closest('.location-pill');
        const notificationButton = event.target.closest('.icon-button');
        const filterButton = event.target.closest('.search-bar button');
        const categoryButton = event.target.closest('.category-button');
        const seeAllButton = event.target.closest('.section-heading button');
        const heartButton = event.target.closest('.heart-button');
        const restaurantCard = event.target.closest('.restaurant-card');
        const previewButton = event.target.closest('.preview-sections button');
        const navButton = event.target.closest('.bottom-nav button');
        const sheetCard = event.target.closest('[data-open-restaurant]');
        const favoriteNameButton = event.target.closest('[data-favorite-name]');
        const detailAction = event.target.closest('[data-detail-action]');
        const profileAction = event.target.closest('[data-profile-action]');
        const pageAction = event.target.closest('[data-page-action]');

        if (closeButton) closeSheet();
        if (locationButton) showToast('Localização definida para São José do Rio Preto.');
        if (notificationButton && !notificationButton.closest('.bottom-nav')) showToast('Você não tem novas notificações.');
        if (filterButton) runSearch();
        if (seeAllButton) showList('Todos os restaurantes', restaurants);
        if (categoryButton) {
          const category = categoryButton.textContent.trim();
          document.querySelectorAll('.category-button').forEach((button) => button.classList.remove('active'));
          categoryButton.classList.add('active');
          const results = restaurants.filter((item) => normalize(item.type).includes(normalize(category)));
          showList(category, results);
        }
        if (heartButton) {
          event.stopPropagation();
          const name = heartButton.closest('.restaurant-card').querySelector('h3').textContent.trim();
          toggleFavorite(name);
        } else if (restaurantCard) {
          const name = restaurantCard.querySelector('h3').textContent.trim();
          openRestaurant(restaurantByName(name));
        }
        if (previewButton) {
          const title = previewButton.querySelector('span').textContent.trim();
          showList(title, restaurants.slice(0, title.includes('Custo') ? 4 : 3));
        }
        if (navButton) setTab(navButton.textContent.trim());
        if (pageAction) {
          const action = pageAction.dataset.pageAction;
          if (action === 'page-search') {
            const input = document.getElementById('pageSearchInput');
            const query = normalize(input?.value.trim() || '');
            showList(input?.value.trim() ? `Busca: ${input.value}` : 'Todos os restaurantes', restaurants.filter((item) => normalize(`${item.name} ${item.type} ${item.district}`).includes(query)));
          }
          if (action === 'focus-search') {
            setTab('Início');
            setTimeout(() => searchInput.focus(), 220);
          }
          if (action === 'go-search') setTab('Buscar');
          if (action === 'import-maps') {
            const form = pageAction.closest('#restaurantForm');
            if (form) importFromMaps(form);
          }
          if (action === 'empty-category') {
            const category = pageAction.textContent.trim();
            showList(category, restaurants.filter((item) => normalize(item.type).includes(normalize(category))));
          }
        }
        if (sheetCard) openRestaurant(restaurantByName(sheetCard.dataset.openRestaurant));
        if (favoriteNameButton) toggleFavorite(favoriteNameButton.dataset.favoriteName);
        if (detailAction) {
          const item = restaurantByName(detailAction.dataset.restaurant);
          if (detailAction.dataset.detailAction === 'maps') window.open(item.mapsUrl || `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent((item.address || item.name) + ' São José do Rio Preto SP')}`, '_blank', 'noopener');
          if (detailAction.dataset.detailAction === 'contact') window.open(`https://wa.me/${item.phone}?text=${encodeURIComponent('Olá, encontrei vocês pelo Mesa Boa.')}`, '_blank', 'noopener');
          if (detailAction.dataset.detailAction === 'reserve') window.open(`https://wa.me/${item.phone}?text=${encodeURIComponent('Olá, quero reservar uma mesa no ' + item.name + '.')}`, '_blank', 'noopener');
        }
        if (profileAction) {
          const messages = {
            reviews: 'Nenhuma avaliação cadastrada ainda.',
            restaurant: ''
          };
          if (profileAction.dataset.profileAction === 'login') {
            renderPage('login');
            screen.scrollTo({ top: 0, behavior: 'smooth' });
          } else if (profileAction.dataset.profileAction === 'signup') {
            renderPage('signup');
            screen.scrollTo({ top: 0, behavior: 'smooth' });
          } else if (profileAction.dataset.profileAction === 'logout') {
            logoutUser();
          } else if (profileAction.dataset.profileAction === 'restaurant') {
            if (!requireLogin({ type: 'restaurant-register' }, 'Entre para cadastrar um restaurante.')) return;
            renderPage('cadastro');
            screen.scrollTo({ top: 0, behavior: 'smooth' });
          } else if (profileAction.dataset.profileAction === 'reviews') {
            if (!requireLogin({ type: 'reviews' }, 'Entre para ver suas avaliações.')) return;
            showToast(messages.reviews);
          } else {
            showToast(messages[profileAction.dataset.profileAction] || 'Ação aberta.');
          }
        }
      });

      document.addEventListener('submit', (event) => {
        const restaurantForm = event.target.closest('#restaurantForm');
        const loginForm = event.target.closest('#loginForm');
        const signupForm = event.target.closest('#signupForm');
        if (!restaurantForm && !loginForm && !signupForm) return;
        event.preventDefault();
        if (restaurantForm) addRestaurant(restaurantForm);
        if (loginForm) loginUser(loginForm);
        if (signupForm) createUser(signupForm);
      });

      searchInput.addEventListener('keydown', (event) => {
        if (event.key === 'Enter') runSearch();
      });

      document.addEventListener('keydown', (event) => {
        if (event.key !== 'Enter' || event.target.id !== 'pageSearchInput') return;
        event.preventDefault();
        document.querySelector('[data-page-action="page-search"]')?.click();
      });

      renderHomeRestaurants();
      syncFavoriteButtons();
    </script>
  </body>
</html>
